spring:
  application:
    name: yaquedo-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

yaquedo:
  jwt:
    secret: ${JWT_SECRET:yaquedo-dev-secret-please-change-in-production-min-32-chars}
    expiration-ms: 86400000
  openstreetmap:
    base-url: https://nominatim.openstreetmap.org
    user-agent: YaQuedo/2.0 (yaquedo@tetradev.pe)
  ai:
    provider: groq
    base-url: https://api.groq.com/openai/v1
    api-key: ${GROQ_API_KEY:}
    model: llama-3.3-70b-versatile
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.tetradev.yaquedo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
