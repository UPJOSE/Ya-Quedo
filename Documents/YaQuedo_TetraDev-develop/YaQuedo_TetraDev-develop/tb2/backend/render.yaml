databases:
  - name: yaquedo-db
    plan: free
    databaseName: yaquedo
    user: yaquedo

services:
  - type: web
    name: yaquedo-api
    runtime: docker
    plan: free
    rootDir: tb2/backend
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    healthCheckPath: /v3/api-docs
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: yaquedo-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: yaquedo-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: yaquedo-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: yaquedo-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: yaquedo-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
